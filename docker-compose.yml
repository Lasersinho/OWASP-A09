version: "3.8"

services:
  vulnerable-server:
    build: .
    container_name: cwe117-log-injection-lab
    ports:
      - "5000:5000"
    volumes:
      # Volúmenes para desarrollo en vivo (hot-reloading)
      - ./app.py:/app/app.py:ro
      - ./frontend:/app/frontend:ro
      - lab_logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - lab-network

volumes:
  lab_logs:

networks:
  lab-network:
    driver: bridge
